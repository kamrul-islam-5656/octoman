<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Octoman Local Request Helper</title>
    <style>
      body {
        margin: 0;
        width: 260px;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #131313;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid #ded9d0;
      }
      .header img {
        width: 24px;
        height: 24px;
        border-radius: 6px;
      }
      .header h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
      }
      .body {
        padding: 12px 14px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #0d9488;
        margin-bottom: 6px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #0d9488;
      }
      p {
        font-size: 12px;
        line-height: 1.5;
        color: #66615b;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon48.png" alt="" />
      <h1>Octoman Local Request Helper</h1>
    </div>
    <div class="body">
      <div class="status"><span class="dot"></span>Active</div>
      <p>
        Octoman can now reach localhost and private-network backends directly from this
        browser, without needing CORS configured on them.
      </p>
    </div>
  </body>
</html>
